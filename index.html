<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="3; url=https://marcos-antonio-portfolio.vercel.app">
  <link rel="canonical" href="https://marcos-antonio-portfolio.vercel.app">
  <title>Marcos Antonio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #0e0e0e;
      color: #e5e5e5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      text-align: center;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 2px solid #2a2a2a;
      border-top-color: #e5e5e5;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .name {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .message {
      font-size: 0.875rem;
      color: #666;
    }

    .link {
      font-size: 0.8rem;
      color: #444;
      text-decoration: underline;
      text-underline-offset: 4px;
    }

    .link:hover { color: #888; }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <span class="name">Marcos Antonio</span>
    <p class="message">Redirecting to portfolio...</p>
    <a class="link" href="https://marcos-antonio-portfolio.vercel.app">
      Click here if not redirected
    </a>
  </div>
</body>
</html>
